<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokedex</title>
    <link rel="stylesheet" href="pokedex.css" />
    <link rel="stylesheet" href="pokedex-background.css" />
    <link rel="stylesheet" href="pokedex-mobile.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
      rel="stylesheet"
    />
    <script src="pokedex.js"></script>
    <script src="pokedex-template.js"></script>
  </head>
  <body onload="loadPokemon()">
    <div class="header">
      <div><h1>Pokédex</h1></div>
      <div class="search-bar">
        <input
          type="text"
          placeholder="Search Pokémon..."
          id="search"
          onkeyup="searchPokemon()"
        />
      </div>
    </div>
    <div id="showBigCard" class="d-none"></div>
    <div id="allCards" class="allCards"></div>
  </body>
</html>
